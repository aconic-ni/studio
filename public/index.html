<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirigiendo a CustomsEX-p Assistant...</title>
    <!-- Meta refresh for immediate redirection -->
    <meta http-equiv="refresh" content="0;url=/">
    <style>
        body { font-family: Arial, sans-serif; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #1a365d; color: #ffffff; text-align: center; }
        .container { padding: 20px; }
        h1 { font-size: 1.5em; margin-bottom: 1em; }
        p { margin-bottom: 1.5em; }
        a { color: #96B3C2; text-decoration: none; font-weight: bold; }
        a:hover { text-decoration: underline; }
        .loader {
            border: 4px solid #f3f3f3; /* Light grey */
            border-top: 4px solid #4361EE; /* Blue */
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>CustomsEX-p Assistant</h1>
        <p>Serás redirigido a la aplicación en breve...</p>
        <div class="loader"></div>
        <p>Si no eres redirigido automáticamente, <a href="/">haz clic aquí para continuar</a>.</p>
    </div>
    <script type="text/javascript">
        // Fallback JavaScript redirection
        window.location.href = "/";
    </script>
</body>
</html>
